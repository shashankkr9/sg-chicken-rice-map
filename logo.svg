<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Plate -->
  <ellipse cx="100" cy="130" rx="80" ry="35" fill="#f5f0e8" stroke="#e0d5c0" stroke-width="2"/>
  <ellipse cx="100" cy="125" rx="70" ry="28" fill="#fff8ef"/>
  
  <!-- Rice mound -->
  <ellipse cx="75" cy="118" rx="28" ry="16" fill="#fff4d6"/>
  <ellipse cx="75" cy="115" rx="26" ry="14" fill="#ffe8a0"/>
  
  <!-- Chicken slices -->
  <g transform="translate(110, 105)">
    <rect x="0" y="0" width="30" height="8" rx="2" fill="#f0c060" transform="rotate(-5)"/>
    <rect x="-2" y="10" width="30" height="8" rx="2" fill="#e8b44c" transform="rotate(-5)"/>
    <rect x="-4" y="20" width="30" height="8" rx="2" fill="#f0c060" transform="rotate(-5)"/>
  </g>
  
  <!-- Chilli sauce dot -->
  <circle cx="55" cy="135" r="6" fill="#d4380d"/>
  
  <!-- Map pin -->
  <g transform="translate(100, 20)">
    <path d="M0 45 L-18 0 A18 18 0 1 1 18 0 Z" fill="#ff6b35"/>
    <circle cx="0" cy="-5" r="8" fill="white"/>
    <text x="0" y="-1" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff6b35">🍗</text>
  </g>
  
  <!-- Text -->
  <text x="100" y="178" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#1a1a1a">Chicken Rice Map</text>
  <text x="100" y="193" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#888">SINGAPORE</text>
</svg>
