<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8ef"/>
      <stop offset="100%" stop-color="#ffe8cc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ff4500"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative dots (map pins scattered) -->
  <circle cx="80" cy="100" r="6" fill="#ff6b35" opacity="0.15"/>
  <circle cx="200" cy="80" r="4" fill="#ff6b35" opacity="0.1"/>
  <circle cx="1050" cy="120" r="8" fill="#ff6b35" opacity="0.12"/>
  <circle cx="1100" cy="200" r="5" fill="#ff6b35" opacity="0.1"/>
  <circle cx="150" cy="500" r="7" fill="#ff6b35" opacity="0.1"/>
  <circle cx="1000" cy="520" r="6" fill="#ff6b35" opacity="0.12"/>
  <circle cx="900" cy="80" r="5" fill="#ff6b35" opacity="0.08"/>
  <circle cx="300" cy="550" r="4" fill="#ff6b35" opacity="0.1"/>
  
  <!-- Main plate illustration -->
  <g transform="translate(180, 180)">
    <!-- Plate -->
    <ellipse cx="120" cy="160" rx="110" ry="50" fill="#f5f0e8" stroke="#e0d5c0" stroke-width="2.5"/>
    <ellipse cx="120" cy="153" rx="95" ry="40" fill="#fff8ef"/>
    
    <!-- Rice -->
    <ellipse cx="85" cy="140" rx="38" ry="22" fill="#fff4d6"/>
    <ellipse cx="85" cy="136" rx="35" ry="19" fill="#ffe8a0"/>
    
    <!-- Chicken slices -->
    <g transform="translate(140, 120)">
      <rect x="0" y="0" width="42" height="11" rx="3" fill="#f0c060" transform="rotate(-5)"/>
      <rect x="-3" y="14" width="42" height="11" rx="3" fill="#e8b44c" transform="rotate(-5)"/>
      <rect x="-6" y="28" width="42" height="11" rx="3" fill="#f0c060" transform="rotate(-5)"/>
    </g>
    
    <!-- Chilli -->
    <circle cx="60" cy="168" r="9" fill="#d4380d"/>
    
    <!-- Map pin above plate -->
    <g transform="translate(120, -20)">
      <path d="M0 55 L-22 0 A22 22 0 1 1 22 0 Z" fill="#ff6b35"/>
      <circle cx="0" cy="-6" r="10" fill="white"/>
      <text x="0" y="-2" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff6b35">📍</text>
    </g>
  </g>
  
  <!-- Title -->
  <text x="620" y="240" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="800" fill="#1a1a1a">Chicken Rice</text>
  <text x="620" y="320" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="800" fill="url(#accent)">Map</text>
  
  <!-- Subtitle -->
  <text x="620" y="370" text-anchor="start" font-family="-apple-system, sans-serif" font-size="26" fill="#666">198 stalls rated · Singapore's most</text>
  <text x="620" y="402" text-anchor="start" font-family="-apple-system, sans-serif" font-size="26" fill="#666">comprehensive chicken rice guide</text>
  
  <!-- Domain pill -->
  <rect x="620" y="440" width="380" height="48" rx="24" fill="#ff6b35"/>
  <text x="810" y="471" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="22" font-weight="600" fill="white">bestchickenricesg.com</text>
  
  <!-- Bottom bar -->
  <rect y="600" width="1200" height="30" fill="#ff6b35" opacity="0.8"/>
  <text x="600" y="621" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="500" fill="white">Tenderness · Rice · Chilli · Soup · Hygiene — Every stall rated</text>
</svg>
